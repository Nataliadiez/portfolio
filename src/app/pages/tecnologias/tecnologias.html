<section class="technologies editorial-section panel-frame" id="tecnologias">
    <aside class="rail technologies__rail" aria-hidden="true" style="--rail-color: var(--pink)">
        <span class="rail__number">04</span>
        <span class="rail__word">Tecnologías</span>
        <span class="rail__barcode"></span>
        <span class="rail__orb"></span>
    </aside>

    <div class="technologies__content">
        <header class="technologies__header">
            <div>
                <p class="section-label technologies__label">Mi stack principal</p>
                <h2 class="section-title">Tecnologías</h2>
            </div>

            <aside class="technologies__learning">
                <strong>Siempre aprendiendo</strong>
                <span aria-hidden="true"><i></i></span>
            </aside>
        </header>

        <div class="technologies__grid" aria-label="Tecnologías que manejo">
            @for (tech of technologies; track tech.name) {
            <article class="tech-card" [class.tech-card--sql]="tech.name === 'SQL'" [style.--tech-color]="tech.color">
                <div class="tech-card__inner">
                    <div class="tech-card__face tech-card__face--front">
                        <span class="tech-card__accent" aria-hidden="true"></span>

                        <div class="tech-card__icon">
                            <img [src]="tech.icon" [alt]="'Logo de ' + tech.name" />
                        </div>

                        <h3>{{ tech.name }}</h3>
                    </div>

                    <div class="tech-card__face tech-card__face--back">
                        <span class="tech-card__accent" aria-hidden="true"></span>

                        <h3>{{ tech.name }}</h3>
                        <p>{{ tech.description }}</p>
                        <small>{{ tech.category }}</small>
                    </div>
                </div>
            </article>
            }
        </div>
    </div>
</section>
