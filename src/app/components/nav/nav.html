<div class="site-nav-panel">
    <nav class="site-nav" aria-label="Navegación principal">
        @for (item of items; track item.sectionId) {
        <button class="site-nav__link" type="button" [class.site-nav__link--active]="activeSection === item.sectionId"
            [attr.aria-current]="activeSection === item.sectionId ? 'page' : null"
            (click)="selectSection(item.sectionId)">
            <span class="site-nav__icon" aria-hidden="true">
                @switch (item.icon) {
                @case ('home') {
                <span class="icons material-symbols-outlined">
                    home
                </span>
                }

                @case ('target') {
                <span class="icons material-symbols-outlined">
                    person_heart
                </span>
                }

                @case ('project') {
                <span class="icons material-symbols-outlined">
                    work
                </span>
                }

                @case ('tech') {
                <span class="icons material-symbols-outlined">
                    code_xml
                </span>
                }

                @case ('contact') {
                <span class="icons material-symbols-outlined">
                    mail
                </span>
                }
                }
            </span>

            <span class="site-nav__label">{{ item.label }}</span>
        </button>
        }
    </nav>

    <aside class="site-nav-status" aria-label="Estado del sistema">
        <div class="site-nav-status__text">
            <span>System status</span>
            <strong>Online</strong>
        </div>

        <div class="site-nav-status__barcode" aria-hidden="true"></div>

        <span class="site-nav-status__caption">Building the future</span>
    </aside>
</div>
