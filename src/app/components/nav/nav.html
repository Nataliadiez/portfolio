<div class="site-nav-panel">
    <nav class="site-nav" aria-label="Navegación principal">
        @for (item of items; track item.sectionId) {
        <button class="site-nav__link" type="button" [class.site-nav__link--active]="activeSection === item.sectionId"
            [attr.aria-current]="activeSection === item.sectionId ? 'page' : null"
            (click)="selectSection(item.sectionId)">
            <span class="site-nav__icon" aria-hidden="true">
                @switch (item.icon) {
                @case ('home') {
                <svg viewBox="0 0 24 24">
                    <path d="M4 11.5 12 5l8 6.5" />
                    <path d="M6.5 10.5V20h11v-9.5" />
                    <path d="M10 20v-5h4v5" />
                </svg>
                }

                @case ('target') {
                <svg viewBox="0 0 24 24">
                    <path d="M12 3v3" />
                    <path d="M12 18v3" />
                    <path d="M3 12h3" />
                    <path d="M18 12h3" />
                    <path d="M8 8.5a5 5 0 1 1 0 7" />
                    <path d="M16 8.5a5 5 0 1 0 0 7" />
                </svg>
                }

                @case ('project') {
                <svg viewBox="0 0 24 24">
                    <path d="M7 4h7l3 3v13H7z" />
                    <path d="M14 4v4h4" />
                    <path d="M9.5 12h5" />
                    <path d="M9.5 16h3" />
                </svg>
                }

                @case ('tech') {
                <svg viewBox="0 0 24 24">
                    <path d="M8 9 4 12l4 3" />
                    <path d="m16 9 4 3-4 3" />
                    <path d="m14 6-4 12" />
                </svg>
                }

                @case ('contact') {
                <svg viewBox="0 0 24 24">
                    <path d="M5 7h14v10H5z" />
                    <path d="m5 8 7 5 7-5" />
                </svg>
                }
                }
            </span>

            <span class="site-nav__label">{{ item.label }}</span>
        </button>
        }
    </nav>

</div>
