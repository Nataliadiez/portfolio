<header class="site-header">
    <button class="site-header__brand" type="button" aria-label="Ir al inicio" (click)="goToSection('inicio')">
        <img class="brand" src="./n.png" alt="">

        <span class="site-header__brand-copy">
            <strong>NATALIA DIEZ</strong>
            <small>SOFTWARE · SYSTEMS · SOLUTIONS</small>
        </span>
    </button>

    <div class="site-header__nav">
        <app-nav [activeSection]="activeSection" (sectionSelected)="goToSection($event)" />
    </div>

    <button class="site-header__menu-button" type="button" aria-label="Abrir menú"
        [attr.aria-expanded]="isMobileMenuOpen" (click)="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav class="site-header__mobile-menu" [class.site-header__mobile-menu--open]="isMobileMenuOpen"
        aria-label="Navegación mobile">
        <button type="button" [class.site-header__mobile-link--active]="activeSection === 'inicio'"
            (click)="goToSection('inicio')">
            Inicio
        </button>

        <button type="button" [class.site-header__mobile-link--active]="activeSection === 'sobre-mi'"
            (click)="goToSection('sobre-mi')">
            Sobre mí
        </button>

        <button type="button" [class.site-header__mobile-link--active]="activeSection === 'proyectos'"
            (click)="goToSection('proyectos')">
            Proyectos
        </button>

        <button type="button" [class.site-header__mobile-link--active]="activeSection === 'tecnologias'"
            (click)="goToSection('tecnologias')">
            Tecnologías
        </button>

        <button type="button" [class.site-header__mobile-link--active]="activeSection === 'contacto'"
            (click)="goToSection('contacto')">
            Contacto
        </button>
    </nav>
</header>
